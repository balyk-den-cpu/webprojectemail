<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="options.css"/>
  <title>Настройки Base44</title>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Base44 Mail Assistant</h1>
        <div class="mini" id="subSummary">Подписка: Пробный тариф</div>
        <div class="mini" id="subPeriod">Период: —</div>
      </div>
      <div class="top-actions">
        <label>
          Язык интерфейса
          <select id="uiLangOptions">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="sr-Latn">Srpski</option>
          </select>
        </label>
        <button id="openAccount" type="button">Открыть личный кабинет</button>
      </div>
    </div>

    <section class="card">
      <h2>Настройки генерации</h2>
      <div class="grid">
        <label>Стиль по умолчанию
          <select id="style">
            <option>Дружелюбный</option>
            <option>Официальный</option>
            <option>Кратко</option>
            <option>Убеждающий</option>
            <option>Технический</option>
          </select>
        </label>
        <label>Язык по умолчанию
          <select id="lang">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="sr-Latn">Srpski</option>
          </select>
        </label>
        <label>
          Режим подключения
          <div class="sites">
            <label><input type="radio" name="mode" value="mock" checked/> Только визуал (mock)</label>
            <label><input type="radio" name="mode" value="api"/> Подключать Base44 (позже)</label>
          </div>
        </label>
      </div>
    </section>

    <section class="card">
      <h2>Где показывать помощника</h2>
      <div class="sites sites--grid">
        <label><input type="checkbox" data-host="gmail" checked/> Gmail</label>
        <label><input type="checkbox" data-host="yandex" checked/> Yandex</label>
        <label><input type="checkbox" data-host="outlook" checked/> Outlook</label>
        <label><input type="checkbox" data-host="mailru" checked/> Mail.ru</label>
      </div>
    </section>

    <div class="actions">
      <button id="save">Сохранить</button>
      <span id="status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
